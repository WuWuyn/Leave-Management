<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BOXICONS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style_register.css">
    <title>Register | Wuwuyn-sites</title>
</head>

<body>
    <!--All wrapper around form-->
    <div class="wrapper">
        <!--Form header-->
        <div class="form-header">
            <!--Title of form-->
            <div class="titles">
                <div class="title-register">Register</div>
            </div>
        </div>

        <!--Register-->
        <div class="switch-form">
            <span>Already have an account? <a href="#">Login</a> </span>
        </div>

        <!--REGISTER form-->
        <form action="#" method="post" class="register-form" autocomplete="off">


            <div class="user-details">

                <!--Input fullname-->
                <div class="input-box">
                    <input type="text" class="input-field" name="register-name" placeholder="Enter your name" required>
                    <label for="register-name" class="label">Full name</label>
                    <i class='bx bxs-user-detail icon'></i>
                </div>

                <!--Input username-->
                <div class="input-box">
                    <input type="text" class="input-field" name="register-username" placeholder="Enter your username" required>
                    <label for="register-username" class="label">Username</label>
                    <i class='bx bx-user icon'></i>
                </div>

                <!--Input password-->
                <div class="input-box">
                    <input type="password" class="input-field" name="register-password"  placeholder="Enter your password" required>
                    <label for="register-password" class="label">Password</label>
                    <i class='bx bx-lock-alt icon'></i>
                </div>

                <!--Confirm password-->
                <div class="input-box">
                    <input type="password" class="input-field" name="register-confirm-password" placeholder="Confirm your password" required>
                    <label for="register-confirm-password" class="label">Confirm password</label>
                    <i class='bx bx-lock-alt icon'></i>
                </div>

                <!--Input email-->
                <div class="input-box">
                    <input type="text" class="input-field" name="register-email" placeholder="Enter your email" required>
                    <label for="register-email" class="label">Email</label>
                    <i class='bx bx-envelope icon'></i>
                </div>

                <!--Input phone number-->
                <div class="input-box">
                    <input type="text" class="input-field" name="register-phone" placeholder="Enter your phone number" required>
                    <label for="register-phone" class="label">Phone Number</label>
                    <i class='bx bx-phone icon'></i>
                </div>

                <!--Input Date of birth-->
                <div class="input-box">
                    <input type="date" class="input-field" name="register-dob" required>
                    <label for="register-dob" class="label">Date of birth</label>
                </div>

                <!--Select Gender-->
                <div class="input-box">
                    Gender
                    <div class="input-gender">
                        <!--Male Option-->
                        <div class="sel-gender">
                            <input type="radio" id="check" name="gender" value="male">
                            <label for="check">Male</label>
                            <i class='bx bx-male-sign' ></i>
                        </div>
                        <!--Female Option-->
                        <div class="sel-gender">
                            <input type="radio" id="check" name="gender" value="male">
                            <label for="check">Female</label>
                            <i class='bx bx-female-sign' ></i>
                        </div>

                    </div>
                </div>
            </div>







            <!--Button submit-->
            <div class="input-box">
                <button class="btn-submit" value="Register">Register <i class='bx bx-chevrons-right'></i></button>
            </div>


        </form>

    </div>
</body>

</html>
