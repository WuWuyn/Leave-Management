<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- BOXICONS -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- CSS -->
    <link rel="stylesheet" href="../css/style_login.css">
    <title>Login | Wuwuyn-sites</title>
</head>

<body>
    <!--All wrapper around form-->
    <div class="wrapper">
        <!--Form header-->
        <div class="form-header">
            <!--Title of form-->
            <div class="titles">
                <div class="title-login">Login</div>
            </div>
        </div>

        <!--LOGIN form-->
        <form action="#" method="post" class="login-form" autocomplete="on">

            <!--Input username-->
            <div class="input-box">
                <input type="text" class="input-field" name="log-username" placeholder="Enter your username">
                <label for="log-username" class="label">Username</label>
                <i class='bx bx-user icon'></i>
            </div>

            <!--Input password-->
            <div class="input-box">
                <input type="password" class="input-field" name="log-pass" placeholder="Enter your password">
                <label for="log-pass" class="label">Password</label>
                <i class='bx bx-lock-alt icon'></i>
            </div>

            <!--Forgot password-->
            <div class="form-cols">
                <div class="col-1">
                    <input type="checkbox" class="save-username">
                    <label for="save-username">Remember me</label>
                </div>
                <div class="col-2">     <!--Make it to right hand-->
                    <a href="#">Forgot password</a>
                </div>
            </div>

            <!--Button submit-->
            <div class="input-box">
                <button class="btn-submit" value="Login">Login <i class='bx bx-log-in'></i></button>
                <p class="separator">or</p>
                <!--Using google Account-->
                <button class="btn-submit" value="LoginGG">Sign in with Google<i class='bx bxl-google'></i></button>
            </div>

            <!--Register-->
            <div class="switch-form">
                <span>Don't have an account? <a href="#">Register</a> </span>
            </div>
        </form>

    </div>

</body>

</html>
